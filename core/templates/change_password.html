{% extends 'base.html' %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <a href="{% url 'teacher_dashboard' %}" style="color: white; text-decoration: none; font-size: 14px; opacity: 0.7; margin-bottom: 10px; display: inline-block;">← Back to Dashboard</a>
        <h2>Change Password</h2>
        <p class="subtitle">Update your Teacher account security</p>
        
        {% if error %}
            <div class="error-msg" style="color: #ff6b6b; margin-bottom: 15px; background: rgba(255,107,107,0.1); padding: 10px; border-radius: 5px;">{{ error }}</div>
        {% endif %}
        {% if success %}
             <div class="success-msg" style="color: #4cd137; margin-bottom: 15px; background: rgba(76, 209, 55, 0.1); padding: 10px; border-radius: 5px;">{{ success }}</div>
        {% endif %}
        
        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="old_password">Current Password</label>
                <input type="password" name="old_password" id="old_password" required>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" name="new_password" id="new_password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" name="confirm_password" id="confirm_password" required>
            </div>
            <button type="submit" class="btn-primary btn-block">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
