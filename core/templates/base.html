<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Connect</title>
    {% load static %}
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=301">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>
<body>
    <div id="global-loader">
        <div class="spinner"></div>
    </div>

    <nav class="navbar">
        <a href="{% url 'index' %}" class="nav-brand">
            <img src="{% static 'images/logo.png' %}" alt="Logo" class="nav-logo">
            <strong>College Connect</strong>
        </a>
        
        <div style="display: flex; align-items: center; gap: 1.5rem;">
            <button id="theme-btn" style="background:none; border:none; font-size:1.2rem; cursor:pointer;" title="Toggle Theme">🌓</button>
            
            {% if request.session.teacher_id or request.session.student_id %}
            <div style="display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); padding: 5px 15px; border-radius: 50px;">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: white; display:flex; align-items:center; justify-content:center; font-weight:800; font-size: 0.75rem;">
                    {{ request.session.name|slice:":1"|upper }}
                </div>
                <a href="{% url 'logout' %}" style="color: var(--danger); font-size: 0.8rem; font-weight: 700; text-decoration: none;">LOGOUT</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{% static 'js/script.js' %}?v=301"></script>
    <!-- Firebase Initialization -->
    <script type="module" src="{% static 'js/firebase-config.js' %}"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const loader = document.getElementById('global-loader');
            if (loader) {
                setTimeout(() => {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }, 300);
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
