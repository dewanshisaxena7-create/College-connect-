{% extends 'base.html' %}

{% block content %}
<div class="login-wrapper" style="padding-top: 50px; padding-bottom: 50px;">
    <div class="login-card" style="width: 100%; max-width: 800px;">
        <h2>Setup Account</h2>
        <p class="subtitle">Please set a secure password and input your weekly schedule.</p>
        
        {% if error %}
            <div class="error-msg" style="color: #ff6b6b; margin-bottom: 15px; background: rgba(255,107,107,0.1); padding: 10px; border-radius: 5px;">{{ error }}</div>
        {% endif %}
        
        <form method="post" class="login-form">
            {% csrf_token %}
            <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" required>
                </div>
            </div>
            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label for="new_password">New Password</label>
                    <input type="password" name="new_password" id="new_password" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" name="confirm_password" id="confirm_password" required>
                </div>
            </div>

            <button type="submit" class="btn-primary btn-block">Save Password & Finish Setup</button>
        </form>
    </div>
</div>
{% endblock %}
