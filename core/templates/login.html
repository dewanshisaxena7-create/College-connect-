{% extends 'base.html' %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card dual-login">
        <h2>Welcome to College Connect</h2>
        <p class="subtitle">Select your role to log in</p>
        
        <div class="role-tabs">
            <button class="tab-btn active" onclick="switchTab('student')">Student</button>
            <button class="tab-btn" onclick="switchTab('teacher')">Teacher</button>
        </div>
        
        {% if error %}
            <div class="error-msg" style="color: #ff6b6b; margin-bottom: 10px; background: rgba(255,107,107,0.1); padding: 10px; border-radius: 5px;">{{ error }}</div>
        {% endif %}
        
        <!-- Student Form -->
        <form method="post" class="login-form" id="student-form">
            {% csrf_token %}
            <input type="hidden" name="login_type" value="student">
            <div class="form-group">
                <label for="roll_number">Roll Number</label>
                <input type="text" name="roll_number" id="roll_number" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <button type="submit" class="btn-primary btn-block">Sign In as Student</button>
        </form>
        
        <!-- Teacher Form -->
        <form method="post" class="login-form" id="teacher-form" style="display: none;">
            {% csrf_token %}
            <input type="hidden" name="login_type" value="teacher">
            <div class="form-group">
                <label for="name">Teacher Name</label>
                <input type="text" name="name" id="name" required>
            </div>
            <div class="form-group">
                <label for="unique_key">Unique Key</label>
                <input type="password" name="unique_key" id="unique_key" required>
            </div>
            <button type="submit" class="btn-primary btn-block">Sign In as Teacher</button>
        </form>
    </div>
</div>

<style>
.role-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.tab-btn { flex: 1; padding: 10px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500;}
.tab-btn.active { background: rgba(255,255,255,0.2); }
</style>

<script>
function switchTab(role) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.login-form').forEach(f => f.style.display = 'none');
    
    if(role === 'student') {
        document.getElementById('student-form').style.display = 'block';
        document.querySelector('.tab-btn:nth-child(1)').classList.add('active');
    } else {
        document.getElementById('teacher-form').style.display = 'block';
        document.querySelector('.tab-btn:nth-child(2)').classList.add('active');
    }
}
</script>
{% endblock %}
