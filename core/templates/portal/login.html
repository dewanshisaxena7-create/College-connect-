<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | College Connect</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/portal_style.css' %}">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card glass-panel text-center">
            <div class="mb-4">
                <h2 class="fw-bold text-white mb-1">Admin Portal</h2>
                <p class="text-muted">Sign in to College Connect Admin</p>
            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger text-start">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" class="text-start">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label text-muted">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary-glass w-100 justify-content-center">
                    Login securely
                </button>
            </form>
            
            <div class="mt-4 text-muted small">
                <a href="#" class="text-primary text-decoration-none" onclick="alert('Password reset requires email configuration. Please contact the system administrator.')">Forgot Password?</a>
            </div>
        </div>
    </div>

</body>
</html>
