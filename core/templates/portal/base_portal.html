<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | College Connect</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/portal_style.css' %}">
</head>
<body>

    <!-- Sidebar -->
    <aside class="portal-sidebar glass-panel">
        <a href="{% url 'portal_dashboard' %}" class="sidebar-logo">
            <i class="fa-solid fa-graduation-cap text-primary me-2"></i>Admin
        </a>
        <nav class="sidebar-nav">
            <a href="{% url 'portal_dashboard' %}" class="nav-item {% if current_path == 'dashboard' %}active{% endif %}">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="{% url 'portal_students' %}" class="nav-item {% if current_path == 'students' %}active{% endif %}">
                <i class="fa-solid fa-user-graduate"></i> Students
            </a>
            <a href="{% url 'portal_teachers' %}" class="nav-item {% if current_path == 'teachers' %}active{% endif %}">
                <i class="fa-solid fa-chalkboard-user"></i> Teachers
            </a>
            <a href="{% url 'portal_schedules' %}" class="nav-item {% if current_path == 'schedules' %}active{% endif %}">
                <i class="fa-regular fa-calendar-days"></i> Schedules
            </a>
            <a href="{% url 'portal_attendance' %}" class="nav-item {% if current_path == 'attendance' %}active{% endif %}">
                <i class="fa-solid fa-clipboard-user"></i> Attendance
            </a>
            <a href="{% url 'portal_notifications' %}" class="nav-item {% if current_path == 'notifications' %}active{% endif %}">
                <i class="fa-solid fa-bell"></i> Notifications
            </a>
        </nav>
        
        <div class="mt-auto px-3">
            <a href="{% url 'portal_logout' %}" class="nav-item text-danger">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="portal-content">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show glass-panel" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Firebase Initialization -->
    <script type="module" src="{% static 'js/firebase-config.js' %}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
