{% extends 'base.html' %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <a href="{% url 'teacher_login' %}" style="color: white; text-decoration: none; font-size: 14px; opacity: 0.7; margin-bottom: 10px; display: inline-block;">← Back to Login</a>
        <h2>Forgot Password</h2>
        <p class="subtitle">Reset your Teacher account password</p>
        
        {% if error %}
            <div class="error-msg" style="color: #ff6b6b; margin-bottom: 15px; background: rgba(255,107,107,0.1); padding: 10px; border-radius: 5px;">{{ error }}</div>
        {% endif %}
        {% if success %}
             <div class="success-msg" style="color: #4cd137; margin-bottom: 15px; background: rgba(76, 209, 55, 0.1); padding: 10px; border-radius: 5px;">{{ success }}</div>
        {% endif %}
        
        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="teacher_id">Teacher ID</label>
                <input type="text" name="teacher_id" id="teacher_id" required>
            </div>
            <div class="form-group">
                <label for="email">Registered Email</label>
                <input type="email" name="email" id="email" required>
            </div>
            <button type="submit" class="btn-primary btn-block">Send OTP</button>
        </form>
    </div>
</div>
{% endblock %}
